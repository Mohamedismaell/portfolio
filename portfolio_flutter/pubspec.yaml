name: portfolio_flutter
description: A high-performance Flutter Web Portfolio
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.6
  go_router: ^12.1.1
  dio: ^5.7.0
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.1.13
  url_launcher: ^6.3.1
  visibility_detector: ^0.4.0+2
  fluttertoast: ^8.2.10
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
